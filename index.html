<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马坡村头大喇叭 AI 新闻版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        :root {
            --cream: #FAF8F3;
            --champagne: #E8DCC4;
            --dark-champagne: #D4C5A9;
            --brown: #8B7355;
            --dark-brown: #6B5444;
            --darker-brown: #4A3F35;
            --light-gray: #D1D5DB;
            --gray: #9CA3AF;
            --dark-gray: #6B6B6B;
        }

        body {
            color: var(--dark-gray);
        }

        .news-card {
            transition: transform 0.2s, box-shadow 0.2s;
            background: var(--cream);
            border: 1px solid var(--champagne);
        }
        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(139, 115, 85, 0.15);
        }
        .loading-spinner {
            border: 3px solid var(--champagne);
            border-top: 3px solid var(--brown);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body style="background-color: #F5F3EE;">
    <!-- 顶部导航栏 -->
    <header style="background: linear-gradient(to right, #8B7355, #6B5444); color: #FAF8F3;" class="shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fa fa-bullhorn text-3xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">马坡村头大喇叭</h1>
                        <p class="text-sm" style="color: #E8DCC4;">AI 新闻版 - 全球资讯，村头播报</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm">
                        <span id="newsCount" class="font-bold text-xl">0</span>
                        <span style="color: #E8DCC4;">条新闻</span>
                    </div>
                    <button onclick="refreshNews()" style="background-color: #FAF8F3; color: #6B5444;" class="px-4 py-2 rounded-lg transition flex items-center space-x-2" onmouseover="this.style.backgroundColor='#E8DCC4'" onmouseout="this.style.backgroundColor='#FAF8F3'">
                        <i class="fa fa-refresh" id="refreshIcon"></i>
                        <span>刷新</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 控制面板 -->
    <div class="container mx-auto px-4 py-6">
        <div style="background-color: #FAF8F3; border: 1px solid #E8DCC4;" class="rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- 搜索框 -->
                <div class="col-span-1 md:col-span-2">
                    <div class="relative">
                        <i class="fa fa-search absolute left-3 top-3" style="color: #9CA3AF;"></i>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="搜索新闻标题或内容..."
                            style="background-color: #FAF8F3; border-color: #D4C5A9; color: #4A3F35;"
                            class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:border-transparent"
                            oninput="filterNews()"
                            onfocus="this.style.outline='2px solid #8B7355'"
                            onblur="this.style.outline='none'"
                        >
                    </div>
                </div>

                <!-- 来源筛选 -->
                <div>
                    <select
                        id="sourceFilter"
                        style="background-color: #FAF8F3; border-color: #D4C5A9; color: #4A3F35;"
                        class="w-full px-4 py-2 border rounded-lg"
                        onchange="filterNews()"
                        onfocus="this.style.outline='2px solid #8B7355'"
                        onblur="this.style.outline='none'"
                    >
                        <option value="all">全部来源</option>
                    </select>
                </div>
            </div>

            <!-- 自动刷新设置 -->
            <div class="mt-4 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input
                            type="checkbox"
                            id="autoRefresh"
                            style="color: #8B7355;"
                            class="w-4 h-4 rounded"
                            onchange="toggleAutoRefresh()"
                        >
                        <span class="text-sm" style="color: #6B6B6B;">自动刷新</span>
                    </label>
                    <select
                        id="refreshInterval"
                        style="background-color: #FAF8F3; border-color: #D4C5A9; color: #4A3F35;"
                        class="px-3 py-1 border rounded text-sm"
                        disabled
                    >
                        <option value="60000">1 分钟</option>
                        <option value="300000" selected>5 分钟</option>
                        <option value="600000">10 分钟</option>
                        <option value="1800000">30 分钟</option>
                    </select>
                </div>
                <div class="text-sm" style="color: #9CA3AF;">
                    最后更新: <span id="lastUpdate">未更新</span>
                </div>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loading-spinner"></div>
            <p class="mt-4" style="color: #6B6B6B;">正在加载 AI 新闻...</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorState" class="text-center py-20 hidden">
            <i class="fa fa-exclamation-triangle text-6xl mb-4" style="color: #D4C5A9;"></i>
            <p style="color: #6B6B6B;" class="text-lg mb-2">无法连接到后端服务器</p>
            <p style="color: #9CA3AF;" class="text-sm">请确保后端服务器正在运行（端口 5000）</p>
        </div>

        <!-- 新闻列表 -->
        <div id="newsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- 新闻卡片将在这里动态生成 -->
        </div>

        <!-- 无结果提示 -->
        <div id="noResults" class="text-center py-20 hidden">
            <i class="fa fa-search text-6xl mb-4" style="color: #D4C5A9;"></i>
            <p style="color: #9CA3AF;" class="text-lg">没有找到相关新闻</p>
        </div>
    </div>

    <script>
        // 自动检测 API 地址（开发环境 vs 生产环境）
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5001/api'  // 本地开发
            : '/api';  // 生产环境（Render）

        let allNews = [];
        let filteredNews = [];
        let autoRefreshTimer = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            refreshNews();
        });

        // 刷新新闻
        async function refreshNews() {
            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('fa-spin');

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('newsContainer').classList.add('hidden');
            document.getElementById('noResults').classList.add('hidden');
            document.getElementById('errorState').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/news`);

                if (!response.ok) {
                    throw new Error('后端服务器响应错误');
                }

                const data = await response.json();

                if (data.status === 'ok') {
                    allNews = data.news;
                    console.log(`成功获取 ${allNews.length} 条新闻`);

                    // 更新来源筛选选项
                    updateSourceFilter();

                    filteredNews = [...allNews];
                    renderNews();
                    updateLastUpdateTime();
                } else {
                    throw new Error('数据格式错误');
                }

            } catch (error) {
                console.error('获取新闻失败:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.remove('hidden');
            }

            refreshIcon.classList.remove('fa-spin');
        }

        // 更新来源筛选选项
        function updateSourceFilter() {
            const sourceFilter = document.getElementById('sourceFilter');
            const sources = [...new Set(allNews.map(news => news.source))];

            // 保留"全部来源"
            sourceFilter.innerHTML = '<option value="all">全部来源</option>';

            sources.forEach(source => {
                const option = document.createElement('option');
                option.value = source;
                option.textContent = source;
                sourceFilter.appendChild(option);
            });
        }

        // 渲染新闻
        function renderNews() {
            const container = document.getElementById('newsContainer');
            const loadingState = document.getElementById('loadingState');
            const noResults = document.getElementById('noResults');

            loadingState.classList.add('hidden');

            if (filteredNews.length === 0) {
                container.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            container.classList.remove('hidden');
            container.innerHTML = '';

            filteredNews.forEach(news => {
                const card = createNewsCard(news);
                container.appendChild(card);
            });

            document.getElementById('newsCount').textContent = filteredNews.length;
        }

        // 创建新闻卡片
        function createNewsCard(news) {
            const card = document.createElement('div');
            card.className = 'news-card rounded-lg shadow-md p-6 cursor-pointer';
            card.onclick = () => window.open(news.link, '_blank');

            const timeAgo = getTimeAgo(news.timestamp);

            card.innerHTML = `
                <div class="flex items-start justify-between mb-3">
                    <span class="badge" ${news.color}>${news.source}</span>
                    <span class="text-xs" style="color: #9CA3AF;">${timeAgo}</span>
                </div>
                <h3 class="text-lg font-bold mb-2 line-clamp-2" style="color: #4A3F35;">
                    ${news.title}
                </h3>
                <p class="text-sm mb-4 line-clamp-3" style="color: #6B6B6B;">
                    ${news.description.substring(0, 150)}...
                </p>
                <div class="flex items-center justify-between text-sm">
                    <span style="color: #8B7355;" class="font-medium">${news.category}</span>
                    <i class="fa fa-external-link" style="color: #9CA3AF;"></i>
                </div>
            `;

            return card;
        }

        // 计算时间差
        function getTimeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes} 分钟前`;
            if (hours < 24) return `${hours} 小时前`;
            return `${days} 天前`;
        }

        // 筛选新闻
        function filterNews() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const sourceFilter = document.getElementById('sourceFilter').value;

            filteredNews = allNews.filter(news => {
                const matchesSearch = news.title.toLowerCase().includes(searchText) ||
                                    news.description.toLowerCase().includes(searchText);
                const matchesSource = sourceFilter === 'all' || news.source === sourceFilter;
                return matchesSearch && matchesSource;
            });

            renderNews();
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            const autoRefresh = document.getElementById('autoRefresh').checked;
            const intervalSelect = document.getElementById('refreshInterval');

            intervalSelect.disabled = !autoRefresh;

            if (autoRefresh) {
                const interval = parseInt(intervalSelect.value);
                autoRefreshTimer = setInterval(refreshNews, interval);
            } else {
                if (autoRefreshTimer) {
                    clearInterval(autoRefreshTimer);
                    autoRefreshTimer = null;
                }
            }
        }

        // 更新最后更新时间
        function updateLastUpdateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = timeString;
        }

        // 刷新间隔变化时重新设置定时器
        document.getElementById('refreshInterval').addEventListener('change', function() {
            if (document.getElementById('autoRefresh').checked) {
                if (autoRefreshTimer) {
                    clearInterval(autoRefreshTimer);
                }
                const interval = parseInt(this.value);
                autoRefreshTimer = setInterval(refreshNews, interval);
            }
        });
    </script>
</body>
</html>
